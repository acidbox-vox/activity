<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>รายงาน</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@500;600;700&family=Sarabun:wght@400;500;600&family=Bai+Jamjuree:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/activity.css">
<script src="../js/apiConfig.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>if (!requireUnitAuth()) document.documentElement.style.display = "none";</script>
</head>
<body>

<div class="topbar">
  <div class="brand">ระบบส่งยอดกิจกรรม <span class="unit-chip" id="unitChip"></span></div>
  <nav>
    <a href="activities.html">รายการกิจกรรม</a>
    <a href="#" onclick="logoutAndRedirect(); return false;">ออกจากระบบ</a>
  </nav>
</div>
<script>document.getElementById("unitChip").textContent = getAuth().unitName;</script>

<div class="page">

<!-- back button -->
<div style="margin:var(--space-4) 0 var(--space-2);">
  <button class="secondary" onclick="history.back()">&#8592; ย้อนกลับ</button>
</div>

<h2>รายงานกิจกรรม</h2>

<div class="card" id="eventTitle">กำลังโหลด...</div>

<div class="card" id="summary"></div>

<!-- print-only header (visible only @media print via CSS) -->
<div class="print-header" id="printHeader"></div>

<div class="card report-section" id="joinDetail" data-section="join"></div>

<div class="card report-section" id="absentDetail" data-section="absent"></div>

<div class="card report-section" id="deptStatus" data-section="dept"></div>

<!-- action bar -->
<div class="action-bar">
  <button class="secondary" onclick="history.back()">&#8592; ย้อนกลับ</button>
  <button class="secondary" onclick="printMode('join')">&#128424; พิมพ์รายงานผู้เข้าร่วม</button>
  <button class="secondary" onclick="printMode('absent')">&#128424; พิมพ์รายงานผู้ไม่เข้าร่วม</button>
  <button class="secondary" onclick="printMode('dept')">&#128424; พิมพ์สถานะหน่วยส่งยอด</button>
  <button class="secondary" onclick="printMode('all')">&#128424; พิมพ์รายงานทั้งหมด</button>
</div>

</div>

<script src="../js/activityReport.js"></script>

</body>
</html>
