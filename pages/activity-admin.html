<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>จัดการกิจกรรม</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@500;600;700&family=Sarabun:wght@400;500;600&family=Bai+Jamjuree:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/activity.css">
<script src="../js/apiConfig.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>if (!requireAdminAuth()) document.documentElement.style.display = "none";</script>
</head>
<body>

<div class="topbar">
  <div class="brand">ระบบส่งยอดกิจกรรม <span class="unit-chip">แอดมิน</span></div>
  <nav>
    <a href="activities.html">รายการกิจกรรม</a>
    <a href="#" onclick="logoutAndRedirect(); return false;">ออกจากระบบ</a>
  </nav>
</div>

<div class="page">

<!-- ── Create / Edit form ── -->
<h2 id="formTitle">➕ สร้างกิจกรรม</h2>

<div class="card" id="formCard">
  <div class="field">
    <label>ชื่อกิจกรรม</label>
    <input id="eventName" placeholder="ระบุชื่อกิจกรรม">
  </div>
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:var(--space-4);">
    <div class="field">
      <label>วันเวลาเริ่ม</label>
      <input type="datetime-local" id="eventDate">
    </div>
    <div class="field">
      <label>วันเวลาปิดรับรายงาน</label>
      <input type="datetime-local" id="closeDate">
    </div>
  </div>
  <div class="field">
    <label>รายละเอียด</label>
    <textarea id="detail" rows="3" placeholder="รายละเอียดกิจกรรม (ถ้ามี)"></textarea>
  </div>
  <div style="display:flex; gap:var(--space-2);">
    <button id="submitBtn" onclick="submitForm()">สร้างกิจกรรม</button>
    <button id="cancelEditBtn" class="secondary" onclick="cancelEdit()" style="display:none;">ยกเลิก</button>
  </div>
</div>

<!-- ── Open events ── -->
<h2>📅 กิจกรรมที่เปิดอยู่</h2>
<div id="openEventList"><p class="muted">กำลังโหลด...</p></div>

<!-- ── Closed events toggle ── -->
<div style="margin-top:var(--space-5);">
  <button class="secondary" id="closedToggleBtn" onclick="toggleClosedPanel()" style="width:100%; text-align:left; justify-content:flex-start;">
    ▼ กิจกรรมที่ผ่านไปแล้ว (<span id="closedCount">…</span>)
  </button>
  <div id="closedPanel" style="display:none; margin-top:var(--space-3);">
    <div id="closedEventList"></div>
  </div>
</div>

</div>

<script src="../js/activityAdmin.js"></script>
</body>
</html>
